name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-Apple-Silicon
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-Intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install nasm
          brew install libjpeg-turbo

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH
          $env:VCPKG_ROOT = "$env:VCPKG_INSTALLATION_ROOT"
          vcpkg install libjpeg-turbo:x64-windows-static
          echo "TURBOJPEG_LIB_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\lib" >> $env:GITHUB_ENV
          echo "TURBOJPEG_INCLUDE_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\include" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Media Forge ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download for your platform.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
